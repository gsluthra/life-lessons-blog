baseurl = "/"
languageCode = "en-us"
defaultContentLanguage = "en"
title = "life-lessons.in"
theme = "ghostwriter"
# disqusShortname = ""
# googleAnalytics = ""
paginate = 50
copyright = "© Gurpreet Luthra 2026"
#uglyurls = true



[Params]
    mainSections = ["post"]
    intro = true
    headline = "Life-Lessons in Tech"
    description = "Lessons from living in Tech by Gurpreet"
    author = "Gurpreet Luthra"
    github = "https://github.com/gsluthra"
    twitter = "https://twitter.com/_zenx_"
    # email = "XXX@example.com"
    opengraph = true
    images = ["/images/general/martin-backpacker-guitar.jpg"]
    rss = true
    shareTwitter = true
    shareLinkedIn = true
    shareFacebook = true
    dateFormat = "Mon, Jan 2, 2006"
    readingTime =  true
    readingTimeText = "Estimated reading time:"


[author]
    name =  "Gurpreet Luthra"
    profile =  "Technical Product Consultant"


[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ""
    lineAnchors = ""
    lineNoStart = 1
    lineNos = true
    lineNumbersInTable = true
    noClasses = true
    style = "bw"
    tabWidth = 4

[Permalinks]
    post = "/:year/:month/:day/:filename"


[privacy.disqus]
disable = true

[privacy.googleAnalytics]
anonymizeIP = true
respectDoNotTrack = true
useSessionStorage = false


[taxonomies]
  tag = "tags"

